<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-rocket"></i>
                </div>
                <div>
                    <div class="logo-text">YanCarz</div>
                    <div class="logo-subtext">Pro</div>
                </div>
            </div>

            <ul class="sidebar-menu">
                <li class="menu-section-title">Main</li>
                <li class="menu-item">
                    <a href="dashboard.html" class="menu-link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li class="menu-section-title">Management</li>
                <li class="menu-item">
                    <a href="agencies.html" class="menu-link">
                        <i class="fas fa-building"></i>
                        <span>Agencies</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="users.html" class="menu-link active">
                        <i class="fas fa-users"></i>
                        <span>Users</span>
                    </a>
                </li>

                <li class="menu-section-title">Insights</li>
                <li class="menu-item">
                    <a href="analytics.html" class="menu-link">
                        <i class="fas fa-chart-bar"></i>
                        <span>Analytics</span>
                    </a>
                </li>

                <li class="menu-section-title">Preferences</li>
                <li class="menu-item">
                    <a href="settings.html" class="menu-link">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                </li>

                <li class="menu-item" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;">
                    <a href="#" class="menu-link" onclick="handleLogout(event)">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Navbar -->
            <nav class="navbar">
                <div class="navbar-left">
                    <button class="toggle-sidebar-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search users...">
                    </div>
                </div>
                <div class="navbar-right">
                    <button class="icon-btn with-notification">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="icon-btn">
                        <i class="fas fa-envelope"></i>
                    </button>
                    <div class="user-profile">
                        <div class="avatar">AD</div>
                        <div class="user-info">
                            <div class="user-name">Admin</div>
                            <div class="user-role">Administrator</div>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Content Area -->
            <div class="content">
                <div class="page-header">
                    <h1>Users Management</h1>
                    <p>View and manage all platform users</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>All Users</h2>
                    </div>

                    <div class="search-filter">
                        <input type="text" placeholder="Search by name or email..." id="userSearch" onkeyup="filterUsers()">
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable">
                                <!-- Populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Check authentication
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const users = [
            { id: 1, name: 'Alice Chen', email: 'alice@example.com', role: 'admin', status: 'active', joined: '2024-01-15' },
            { id: 2, name: 'Bob Martinez', email: 'bob@example.com', role: 'staff', status: 'active', joined: '2024-02-10' },
            { id: 3, name: 'Carol Davis', email: 'carol@example.com', role: 'customer', status: 'active', joined: '2024-02-20' },
            { id: 4, name: 'David Lee', email: 'david@example.com', role: 'staff', status: 'inactive', joined: '2024-01-20' },
            { id: 5, name: 'Emma Wilson', email: 'emma@example.com', role: 'customer', status: 'active', joined: '2024-02-25' },
            { id: 6, name: 'Frank Garcia', email: 'frank@example.com', role: 'customer', status: 'active', joined: '2024-02-28' },
        ];

        function renderUsers(data = users) {
            const table = document.getElementById('usersTable');
            table.innerHTML = data.map(user => `
                <tr>
                    <td><strong>${user.name}</strong></td>
                    <td>${user.email}</td>
                    <td>
                        <span class="badge badge-${user.role === 'admin' ? 'primary' : user.role === 'staff' ? 'success' : 'warning'}">
                            ${user.role}
                        </span>
                    </td>
                    <td>
                        <label class="toggle">
                            <input type="checkbox" ${user.status === 'active' ? 'checked' : ''} onchange="toggleUserStatus(${user.id})">
                            <span class="toggle-slider"></span>
                        </label>
                    </td>
                    <td>${user.joined}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-secondary btn-sm" onclick="viewUser(${user.id})">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterUsers() {
            const searchTerm = document.getElementById('userSearch').value.toLowerCase();
            const filtered = users.filter(user =>
                user.name.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm)
            );
            renderUsers(filtered);
        }

        function toggleUserStatus(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                user.status = user.status === 'active' ? 'inactive' : 'active';
                renderUsers();
            }
        }

        function viewUser(id) {
            const user = users.find(u => u.id === id);
            alert(`Viewing user: ${user.name}\nEmail: ${user.email}\nRole: ${user.role}`);
        }

        function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user?')) {
                const index = users.findIndex(u => u.id === id);
                if (index > -1) {
                    users.splice(index, 1);
                    renderUsers();
                }
            }
        }

        // Initialize
        renderUsers();
    </script>
</body>
</html>
